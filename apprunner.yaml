version: 1.0
runtime: nodejs22

build:
  commands:
    pre-build:
      - npm ci
    build:
      - npm run build

run:
  runtime-version: 22.14.0
  command: sh -c 'npx prisma migrate deploy && npm run start -- --hostname 0.0.0.0 --port ${PORT:-3000}'
  network:
    port: 3000
    env: PORT
  env:
    - name: NODE_ENV
      value: production
